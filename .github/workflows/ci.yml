name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff
      - run: ruff check .

  # ── 2. Format ──────────────────────────────────────────────────
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff==0.15.13 black==25.11.0
      - run: ruff format --check . && black --check .

  # ── 3. Tests ───────────────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    needs: [lint, format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - name: Run tests (skip model quality — no artifact in CI)
        run: pytest -v --tb=short -k 'not threshold'
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  # ── 4. Sécurité ────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install bandit
      - run: bandit -r src/ backend/ -c .bandit.yaml

  # ── 5. Build Docker backend ────────────────────────────────────
  docker-backend:
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t olist-mlops-backend:ci -f backend/Dockerfile .
      - name: Smoke test — /health endpoint
        run: |
          docker run -d --name test-backend -p 8000:8000 \
            -e MINIO_ENDPOINT=http://localhost:9000 \
            -e MINIO_BUCKET_MODELS=ml-models \
            -e MODEL_OBJECT_NAME=model_latest.joblib \
            -e LOCAL_MODEL_PATH=/app/tmp/model.joblib \
            olist-mlops-backend:ci || true
          sleep 3
          docker logs test-backend 2>&1 | head -20 || true
          docker stop test-backend || true
