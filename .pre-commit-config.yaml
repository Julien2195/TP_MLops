repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-r", "src/", "-c", ".bandit.yaml"]
        exclude: ^tests/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Bloquer les artefacts ML accidentels
  - repo: local
    hooks:
      - id: no-ml-artifacts
        name: Bloquer artefacts ML (.pkl, .joblib, .h5)
        language: pygrep
        types: [file]
        entry: '\.(pkl|joblib|h5|onnx|pt|pth)$'
        pass_filenames: true
